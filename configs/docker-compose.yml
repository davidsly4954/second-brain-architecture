# Neo4j Knowledge Graph — Docker Compose
# Part of the 8-Layer Second Brain Architecture
#
# Usage:
#   docker compose up -d
#   Open http://localhost:7474 for the Neo4j browser
#
# Set NEO4J_PASSWORD in your environment or .env file before starting.

services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j-knowledge-graph
    ports:
      - "127.0.0.1:7474:7474"   # Browser UI (localhost only)
      - "127.0.0.1:7687:7687"   # Bolt protocol (localhost only)
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-changeme}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
      - NEO4J_db_tx__log_rotation_retention__policy=1 files
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    restart: unless-stopped
    mem_limit: 2G
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
